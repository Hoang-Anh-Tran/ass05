<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookstore Microservices</title>
    <meta name="description" content="A microservice-based bookstore with customer and admin interfaces">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="ri-book-3-line logo-icon"></i>
                <h2>Bookstore<span class="accent">MS</span></h2>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section-label">Customer</div>
                <a href="#" class="nav-item active" data-target="store">
                    <i class="ri-store-2-line"></i>
                    <span>Book Store</span>
                </a>
                <a href="#" class="nav-item" data-target="cart">
                    <i class="ri-shopping-cart-2-line"></i>
                    <span>My Cart</span>
                </a>
                <a href="#" class="nav-item" data-target="orders">
                    <i class="ri-truck-line"></i>
                    <span>My Orders</span>
                </a>

                <div class="nav-section-label" id="admin-nav-label" style="margin-top:16px;">Admin</div>
                <a href="#" class="nav-item admin-nav-item" data-target="dashboard">
                    <i class="ri-dashboard-line"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item admin-nav-item" data-target="books">
                    <i class="ri-book-read-line"></i>
                    <span>Manage Books</span>
                </a>
                <a href="#" class="nav-item admin-nav-item" data-target="customers">
                    <i class="ri-user-smile-line"></i>
                    <span>Customers</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <p>Status: <span class="status-indicator"></span> Online</p>
                <div class="theme-toggle">
                    <i class="ri-moon-line"></i>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="topbar">
                <div class="search-bar">
                    <i class="ri-search-line"></i>
                    <input type="text" placeholder="Search across microservices...">
                </div>
                <div class="user-profile" id="user-profile-btn" onclick="openCustomerSelector()">
                    <img src="https://ui-avatars.com/api/?name=Guest&background=4318ff&color=fff" alt="User"
                        id="user-avatar">
                    <span id="user-name">Guest</span>
                    <i class="ri-arrow-down-s-line" style="color:var(--text-muted);"></i>
                </div>
            </header>

            <div class="content-wrapper" id="content-area">
                <!-- Dynamic Content Loads Here -->
            </div>
        </main>
    </div>

    <!-- Modals and Alerts Overlay -->
    <div id="toast-container" class="toast-container"></div>

    <script src="app.js"></script>
</body>

</html>
